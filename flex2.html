<!DOCTYPE html>
<html>
    <head>
        <title> css flex </title>
        <style>
            .parent{
                display: flex;
                height: 100vh;
                flex-direction: column-reverse;
            }
            .one{
                background-color: aqua;
                flex: 1;
            }
            .two{
                background-color: blueviolet;
                flex: 1;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            <div class="one">1</div>
            <div class="two">2</div>
        </div>
    </body>
</html>
