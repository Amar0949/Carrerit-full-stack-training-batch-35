<!DOCTYPE html>
<html>
    <head>
        <title>grid example-3</title>
        <style>
            *{
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
            }
            .parent{
                height: 100vh;
                color: black;
                text-align: center;
                display: grid;
                grid-template-rows: 15% 70% 15%;
                grid-template-columns: 20% 60% 20%;
                gap: 10px;
            }
            .header{
                background-color: blue;
                grid-row: 1/2;
                grid-column: 1/4;
            }
            .navbar{
                background-color: aquamarine;
                grid-row: 2/3;
                grid-column: 1/2;
            }
            .content{
                background-color: grey;
                grid-row: 2/3;
                grid-column: 2/3;
            }
            .aside{
                background-color: aquamarine;
                grid-row: 2/3;
                grid-column: 3/4;
            }
            .footer{
                background-color: blue;
                grid-row: 3/4;
                grid-column: 1/4;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            <div class="header">header</div>
            <div class="navbar">navbar</div>
            <div class="content">content</div>
            <div class="aside">aside</div>
            <div class="footer">footer</div>
        </div>
    </body>
</html>
