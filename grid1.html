<!DOCTYPE html>
<html>
    <head>
        <title>Grid Example</title>
        <style>
            *{
                padding: 0px;
                margin: 0px;
                box-sizing: border-box;
            }
            .parent{
                height: 100vh;
                color: white;
                text-align: center;
                display: grid;
                grid-template-rows: 20% 25% 45% 15%;
                grid-template-columns: 25% 25% 25% 25%;
                gap: 10px;
                font-weight: bold;
                padding: 50px;
            }
            .header{
                background-color: blueviolet;
                grid-column: 1/5;
                grid-row: 1/2;
            }
            .smallbox{
                background-color: blueviolet;
                grid-column: 1/2;
                grid-row: 2/3;
            }
            .smallbox1{
                background-color: blueviolet;
                grid-column: 2/3;
                grid-row: 2/3;
            }
            .smallbox2{
                background-color: blueviolet;
                grid-column: 3/4;
                grid-row: 2/3;
            }
            .sidebar{
                background-color: blueviolet;
                grid-column: 4/5;
                grid-row: 2/4;
            }
            .content{
                background-color: blueviolet;
                grid-column: 1/4;
                grid-row: 3/4;
            }
            .footer{
                background-color: blueviolet;
                grid-column: 1/5;
                grid-row: 4/5;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            <div class="header">header</div>
            <div class="smallbox">smallbox</div>
            <div class="smallbox1">smallbox</div>
            <div class="smallbox2">smallbox</div>
            <div class="sidebar">sidebar</div>
            <div class="content">content</div>
            <div class="footer">footer</div>           
        </div>
    </body>
</html>
