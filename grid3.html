<!DOCTYPE html>
<html>
    <head>
        <title>grid example-2</title>
        <style>
            *{
                padding: 0px;
                margin: 0px;
                box-sizing: border-box;
            }
            .parent{
                height: 100vh;
                color: black;
                text-align: center;
                display: grid;
                grid-auto-rows: 15% 15% 70%;
                grid-template-columns: 30% 30% 40%;
                gap: 10px;
                font-weight: bold;
                padding: 30px;
            }
            .header{
                background-color: orange;
                grid-row: 1/2;
                grid-column: 1/4;
            }
            .search{
                background-color: lightgreen;
                grid-row: 2/3;
                grid-column: 1/3;
            }
            .rightsidebar{
                background-color: coral;
                grid-row: 2/4;
                grid-column: 3/4;
            }
            .leftsidebar{
                background-color: lightseagreen;
                grid-row: 3/4;
                grid-column: 1/2;
            }
            .middlecolumn{
                background-color: blueviolet;
                grid-row: 3/4;
                grid-column: 2/3;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            <div class="header">header</div>
            <div class="search">search</div>
            <div class="rightsidebar">rightsidebar</div>
            <div class="leftsidebar">leftsidebar</div>
            <div class="middlecolumn">middlecolumn</div>
        </div>
    </body>
</html>
