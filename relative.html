<!DOCTYPE html>
<html>
    <head>
        <title>relative - Example</title>
        <style>
            .common{
                width: 100px;
                height: 100px;
                border: 1px solid gray;
                font-weight: bold;
                color: white;
            }
            .c1{
                background-color: black;
                position: relative;
                left: 240px;
                top: 240px;
                z-index: 20;
            }
            .c2{
                background-color: aqua;
                position: relative;
                left: 180px;
                top: 80px;
                z-index: 14;
            }
            .c3{
                background-color: blue;
                position: relative;
                left: 120px;
                bottom: 80px;
                z-index: 10;
            }
            .c4{
                background-color: blueviolet;
                position: relative;
                bottom: 240px;
                left: 70px;
                z-index: 8;
            }
            .c5{
                background-color: brown;
                position: relative;
                bottom: 400px;
                right: 4px;
            }
        </style>
    </head>
    <body>
        <div class="common c1">1</div>
        <div class="common c2">2</div>
        <div class="common c3">3</div>
        <div class="common c4">4</div>
        <div class="common c5">5</div>
    </body>
</html>
