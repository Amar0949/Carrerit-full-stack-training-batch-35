<!DOCTYPE html>
<html>
    <head>
        <title>css flex </title>
        <style>
            .parent{
                display: flex;
                height: 100vh;
            }
            .child1{
                background-color: blueviolet;
                flex: 1;
                display: flex;
                gap: 10px;
                flex-direction: column;
            }
            .child2{
                background-color: aquamarine;
                flex: 1;
                display: flex;
                gap: 10px;
                flex-direction: row;
            }
            .subchild1{
                background-color: brown;
                flex: 1;
            }
            .subchild2{
                background-color: chartreuse;
                flex: 1;
            }
            .subchild3{
                background-color: coral;
                flex: 1;
            }
            .subchild4{
                background-color: green;
                flex: 1;
            }
            .subchild5{
                background-color: cyan;
                flex: 1;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            <div class="child1">
                <div class="subchild1">1</div>
                <div class="subchild2">2</div>
                <div class="subchild3">3</div>
            </div>
            <div class="child2">
                <div class="subchild4">4</div>
                <div class="subchild5">5</div>
            </div>
        </div>
    </body>
</html>
